<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Finder - Comparateur de prix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⛽ Gas Finder</h1>
            <p>Trouvez les 5 stations les plus proches au meilleur prix.</p>
        </header>

        <section class="search-section">
            <input type="text" id="addressInput" placeholder="Entrez une adresse (ex: 75001 Paris)">
            <select id="fuelInput">
                <option value="">Tous les carburants</option>
                <option value="Gazole">Gazole</option>
                <option value="E10">SP95-E10</option>
                <option value="SP95">SP95</option>
                <option value="SP98">SP98</option>
            </select>
            <button id="searchBtn">Rechercher</button>
        </section>

        <div id="searchHistory" class="search-history"></div>

        <div id="stationList" class="station-list"></div>
        <div id="map"></div>
    </div>

    <!-- Replace YOUR_API_KEY with your Google Maps API Key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap&libraries=geometry,places" async defer></script>
    <script src="script.js"></script>
</body>
</html>
